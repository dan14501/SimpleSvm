name: Build SimpleSvm
 
on:
  push:
    branches: [ master ]
  workflow_dispatch:
 
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
 
jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 60
 
    steps:
    - name: Checkout
      uses: actions/checkout@v4
 
    - name: Install WDK
      shell: pwsh
      run: |
        Write-Host "Downloading WDK bootstrapper..."
        curl.exe -L -o "$env:TEMP\wdksetup.exe" "https://go.microsoft.com/fwlink/?linkid=2307734"
        Write-Host "Running WDK installer (will download ~2GB, takes 10-20 min)..."
        $proc = Start-Process -FilePath "$env:TEMP\wdksetup.exe" `
          -ArgumentList "/quiet /norestart /ceip off" `
          -Wait -PassThru
        Write-Host "WDK exit code: $($proc.ExitCode)"
        if ($proc.ExitCode -ne 0 -and $proc.ExitCode -ne 3010) {
          throw "WDK install failed with exit code $($proc.ExitCode)"
        }
 
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
 
    - name: Build SimpleSvm
      shell: pwsh
      run: |
        msbuild SimpleSvm.sln /p:Configuration=Release /p:Platform=x64 /p:SignMode=Off
 
    - name: Upload SimpleSvm.sys
      uses: actions/upload-artifact@v4
      with:
        name: SimpleSvm-driver
        path: SimpleSvm\x64\Release\SimpleSvm.sys
        if-no-files-found: warn
