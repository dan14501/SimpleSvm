name: Build SimpleSvm

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 60

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # Установка WDK через winget
    - name: Install WDK
      shell: pwsh
      run: |
        Write-Host "Installing Windows Driver Kit (WDK) via winget..."
        # Команда для установки последней версии WDK
        winget install Microsoft.WindowsWDK --accept-package-agreements --accept-source-agreements
        Write-Host "WDK installation command completed."

    # Настройка MSBuild
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    # Сборка проекта
    - name: Build SimpleSvm
      shell: pwsh
      run: |
        msbuild SimpleSvm.sln /p:Configuration=Release /p:Platform=x64 /p:SignMode=Off

    # Сохранение артефакта
    - name: Upload SimpleSvm.sys
      uses: actions/upload-artifact@v4
      with:
        name: SimpleSvm-driver
        path: SimpleSvm\x64\Release\SimpleSvm.sys
        if-no-files-found: error
