name: Build SimpleSvm

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 60

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # Установка WDK через официальный action
    - name: Install WDK
      uses: microsoft/setup-wdk@v1
      with:
        # Версия Windows 10 WDK (можно указать '10.0.26100' для 11)
        version: '10.0.26100'
        # Автоматически установить также WinSDK (нужен для компиляции)
        installWinSDK: true

    # Setup MSBuild (обязательно после WDK)
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    # Компиляция драйвера
    - name: Build SimpleSvm
      shell: pwsh
      run: |
        # Проверяем, что WDK установлен
        $wdkPath = "C:\Program Files (x86)\Windows Kits\10\build"
        if (Test-Path $wdkPath) {
          Write-Host "WDK found at $wdkPath"
        } else {
          Write-Host "WDK not found, checking alternative paths..."
          Get-ChildItem "C:\Program Files (x86)\Windows Kits\10" -ErrorAction SilentlyContinue
        }
        # Сборка
        msbuild SimpleSvm.sln /p:Configuration=Release /p:Platform=x64 /p:SignMode=Off

    - name: Upload SimpleSvm.sys
      uses: actions/upload-artifact@v4
      with:
        name: SimpleSvm-driver
        path: SimpleSvm\x64\Release\SimpleSvm.sys
        if-no-files-found: error  # лучше error, чтобы сразу увидеть проблему
