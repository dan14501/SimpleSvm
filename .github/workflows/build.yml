name: Build SimpleSvm

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 60

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # Установка WDK через Chocolatey
    - name: Install WDK via Chocolatey
      shell: pwsh
      run: |
        # Проверяем, есть ли Chocolatey (обычно предустановлен)
        if (-not (Get-Command choco.exe -ErrorAction SilentlyContinue)) {
          Write-Host "Installing Chocolatey..."
          Set-ExecutionPolicy Bypass -Scope Process -Force
          [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
          iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
        } else {
          Write-Host "Chocolatey is already installed."
        }
        
        # Устанавливаем WDK (последняя стабильная версия)
        Write-Host "Installing Windows Driver Kit (WDK)..."
        choco install wdk -y --no-progress --limit-output
        
        # Устанавливаем Windows SDK (необходим для компиляции драйверов)
        Write-Host "Installing Windows SDK..."
        choco install windows-sdk-10.0 -y --no-progress --limit-output
        
        # Обновляем PATH в текущей сессии
        $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
        Write-Host "Installation completed."

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build SimpleSvm
      shell: pwsh
      run: |
        # Добавляем пути к инструментам WDK (на всякий случай)
        $wdkBin = "C:\Program Files (x86)\Windows Kits\10\bin\10.0.26100.0\x64"
        if (Test-Path $wdkBin) {
          $env:Path += ";$wdkBin"
        }
        # Сборка
        msbuild SimpleSvm.sln /p:Configuration=Release /p:Platform=x64 /p:SignMode=Off

    - name: Upload SimpleSvm.sys
      uses: actions/upload-artifact@v4
      with:
        name: SimpleSvm-driver
        path: SimpleSvm\x64\Release\SimpleSvm.sys
        if-no-files-found: error
